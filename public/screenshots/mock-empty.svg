<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 620" font-family="'SF Mono', 'Menlo', monospace">
  <!-- Desktop background -->
  <rect width="960" height="620" fill="#e8e8e8"/>
  <!-- Menu bar -->
  <rect width="960" height="28" fill="#f0f0f0"/>
  <text x="16" y="19" font-size="13" fill="#1a1a1a" font-family="system-ui, sans-serif" font-weight="600">Finder</text>
  <text x="900" y="19" font-size="12" fill="#1a1a1a" font-family="system-ui, sans-serif">✂</text>
  <text x="920" y="19" font-size="11" fill="#555" font-family="system-ui, sans-serif">12:34</text>

  <!-- App window shadow -->
  <rect x="244" y="66" width="476" height="414" fill="rgba(0,0,0,0.18)"/>
  <!-- App window -->
  <rect x="240" y="62" width="476" height="414" fill="#ffffff" stroke="#262626" stroke-width="2"/>

  <!-- Header -->
  <line x1="240" y1="114" x2="716" y2="114" stroke="#262626" stroke-width="2"/>
  <text x="264" y="94" font-size="15" font-weight="700" fill="#1a1a1a" letter-spacing="2">PORTKILL</text>
  <rect x="648" y="72" width="54" height="30" fill="#141414"/>
  <text x="675" y="92" font-size="12" fill="#ffffff" text-anchor="middle">↻</text>

  <!-- Tab bar -->
  <rect x="240" y="114" width="238" height="38" fill="#141414"/>
  <text x="358" y="138" font-size="11" font-weight="700" fill="#ffffff" text-anchor="middle" letter-spacing="1">LOCAL</text>
  <rect x="478" y="114" width="238" height="38" fill="#f5f5f5"/>
  <text x="596" y="138" font-size="11" font-weight="700" fill="#6b6b6b" text-anchor="middle" letter-spacing="1">SYSTEM</text>
  <line x1="478" y1="114" x2="478" y2="152" stroke="#262626" stroke-width="2"/>
  <line x1="240" y1="152" x2="716" y2="152" stroke="#262626" stroke-width="2"/>

  <!-- Empty state content -->
  <!-- Knife icon (simple) -->
  <line x1="478" y1="230" x2="478" y2="310" stroke="#d0d0d0" stroke-width="2"/>
  <polygon points="468,230 488,230 478,200" fill="#d0d0d0"/>
  <!-- Circle around -->
  <circle cx="478" cy="270" r="48" fill="none" stroke="#e0e0e0" stroke-width="2" stroke-dasharray="6,4"/>

  <text x="478" y="345" font-size="12" font-weight="700" fill="#999999" text-anchor="middle" letter-spacing="1">NO PORTS LISTENING</text>
  <text x="478" y="365" font-size="11" fill="#bbbbbb" text-anchor="middle">All quiet. Your system is clean.</text>

  <!-- Footer -->
  <line x1="240" y1="412" x2="716" y2="412" stroke="#262626" stroke-width="2"/>
  <rect x="240" y="412" width="476" height="64" fill="#ffffff"/>
  <text x="264" y="442" font-size="11" fill="#6b6b6b" font-weight="700">0 PORTS LISTENING</text>
  <text x="264" y="460" font-size="10" fill="#999999">Last scan: just now</text>
</svg>
